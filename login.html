<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Payoo</title>

    <!-- daisy ui + tailwindcss -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome cdn-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- font outfit -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <!-- favicon -->
    <link rel="shortcut icon" href="/assets/logo.png" type="image/x-icon">


    <style>
        * {
            font-family: "Outfit", sans-serif;
        }
    </style>

</head>

<body class="min-h-screen bg-base-200 shadow-md max-w-[480px] mx-auto">

    <div class="w-[200px] mx-auto pt-32">
        <img src="assets/Logo-full.png" alt="logo">
    </div>

    <!-- login form -->
    <div class="login mt-10">
        <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow mx-auto rounded-2xl">
            <div class="card-body">
                <fieldset class="fieldset space-y-2">
                    <label class="label text-neutral font-bold">Mobile Number</label>
                    <input type="text" id="number" class="input rounded-full " maxlength='11' minlength='11' placeholder="Enter your 11 digit phone number"  value="01234567890"/>
                    <label class="label text-neutral font-bold">4-Digit Pin</label>
                    <input type="password" id="pin" class="input rounded-full" maxlength='4' minlength='4' placeholder="Enter your 4 digit pin" />
                    <!-- <div><a class="link link-hover ">Forgot Pin?</a></div> -->
                    <button class="btn btn-primary mt-4 rounded-full" id="login-btn">Login</button>
                </fieldset>
            </div>
        </div>
    </div>


<script src="login.js"></script>

</body>

</html>
