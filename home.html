<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Payoo</title>

    <!-- daisy ui + tailwindcss -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome cdn-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- font outfit -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <!-- favicon -->
    <link rel="shortcut icon" href="/assets/logo.png" type="image/x-icon">


    <style>
        * {
            font-family: "Outfit", sans-serif;
        }
    </style>

</head>

<body class="min-h-screen max-w-[480px] bg-base-200 mx-auto">

    <header class="shadow border-b border-b-gray-300 sticky top-0 z-50 bg-base-300">
        <section class="w-11/12 mx-auto py-3 flex justify-between items-center">
            <!-- left -->
            <div class="left flex gap-2 items-center">
                <div class="logo w-[60px]">
                    <img src="assets/logo.png" alt="logo">
                </div>

                <div class="balance-info">
                    <p class="text-2xl font-bold">$<span id="balance">45000.00</span></p>
                    <p class="text-neutral/50">Available Balance</p>

                </div>
            </div>

            <!-- right -->

            <div class="right">
                <button class="btn btn-soft rounded-xl"> <a href="login.html"><span><i
                                class="fa-solid fa-arrow-right-from-bracket"></i></span> Logout</a></button>
            </div>

        </section>
    </header>

    <section class="w-11/12 mx-auto pt-10">
        <div class="upper space-y-4">
            <h2 class="text-3xl font-bold">Welcome to Pay<span class="text-primary">oo</span></h2>
            <p class="text-neutral/50">Enjoy easy and convenient financial services with us. Cashout charge is low and
            </p>
        </div>

        <div class="buttons grid grid-cols-3 gap-x-3 gap-y-5 mt-8">
            <button class="btn btn-primary rounded-xl btn-soft flex-col h-full p-5" onclick="showOnly('add-money')">
                <img src="assets/opt-1.png" alt="Add-Money">
                <p>Add Money</p>
            </button>

            <button class="btn btn-primary rounded-xl btn-soft flex-col h-full p-5" onclick="showOnly('cashout')">
                <img src="assets/opt-2.png" alt="Cashout">
                <p>Cashout</p>
            </button>

            <button class="btn btn-primary rounded-xl btn-soft flex-col h-full p-5" onclick="showOnly('send-money')">
                <img src="assets/opt-3.png" alt="Transfer Money">
                <p>Transfer Money</p>
            </button>

            <button class="btn btn-primary rounded-xl btn-soft flex-col h-full p-5" onclick="showOnly('get-bonus')">
                <img src="assets/opt-4.png" alt="Get Bonus">
                <p>Get Bonus</p>
            </button>

            <button class="btn btn-primary rounded-xl btn-soft flex-col h-full p-5" onclick="showOnly('pay-bill')">
                <img src="assets/opt-5.png" alt="Pay Bill">
                <p>Pay Bill</p>
            </button>

            <button class="btn btn-primary rounded-xl btn-soft flex-col h-full p-5" onclick="showOnly('history-container')">
                <img src="assets/opt-6.png" alt="Transactions">
                <p>Transactions</p>
            </button>

        </div>
    </section>

    <section id="add-money" class="w-11/12 mx-auto py-10 toggles">
        <h2 class="font-bold text-2xl mb-5">Add Money</h2>

        <div class="login mt-10">
            <div class="card bg-base-100  shadow  rounded-2xl">
                <div class="card-body">
                    <fieldset class="fieldset space-y-2">

                        <label class="label text-neutral font-bold">Select A Bank</label>
                        <select class="select rounded-full w-full" id="bank-name">
                            <option disabled selected>Select A Bank</option>
                            <option value="sonali">Sonali Bank</option>
                            <option value="janata">Janata Bank</option>
                            <option value="agrani">Agrani Bank</option>
                            <option value="rupali">Rupali Bank</option>
                            <option value="grameen">Grameen Bank</option>
                            <option value="islamic">Islami Bank</option>
                            <option value="ific">IFIC Bank</option>
                            <option value="dbbl">Dutch-Bangla Bank</option>
                        </select>


                        <label class="label text-neutral font-bold">Bank Account Number</label>
                        <input type="text" id="add-number" class="input rounded-full w-full " maxlength='11'
                            minlength='11' placeholder="Enter 11 digit Account number" />

                        <label class="label text-neutral font-bold">Amount to Add</label>
                        <input type="number" id="add-amount" class="input rounded-full w-full"
                            placeholder="Enter Amount to Add" />

                        <label class="label text-neutral font-bold">Pin Number</label>
                        <input type="password" id="add-pin" class="input rounded-full w-full" maxlength='4'
                            minlength='4' placeholder="Enter your 4 digit pin" />
                        <!-- <div><a class="link link-hover ">Forgot Pin?</a></div> -->
                        <button class="btn btn-primary mt-4 rounded-xl" id="add-btn">Add Money</button>
                    </fieldset>
                </div>
            </div>
        </div>

    </section>

    <section id="cashout" class="w-11/12 mx-auto py-10 hidden toggles">
        <h2 class="font-bold text-2xl mb-5">Cashout</h2>

        <div class="cashout-form mt-10">
            <div class="card bg-base-100  shadow  rounded-2xl">
                <div class="card-body">
                    <fieldset class="fieldset space-y-2">
                        <label class="label text-neutral font-bold">Agent Number</label>
                        <input type="text" id="cashout-number" class="input rounded-full w-full " maxlength='11'
                            minlength='11' placeholder="Enter 11 digit number" />

                        <label class="label text-neutral font-bold">Amount</label>
                        <input type="number" id="cashout-amount" class="input rounded-full w-full"
                            placeholder="Enter amount to withdraw" />

                        <label class="label text-neutral font-bold">Pin Number</label>
                        <input type="password" id="cashout-pin" class="input rounded-full w-full" maxlength='4'
                            minlength='4' placeholder="Enter your 4 digit pin" />
                        <!-- <div><a class="link link-hover ">Forgot Pin?</a></div> -->
                        <button class="btn btn-primary mt-4 rounded-xl" id="cashout-btn">Withdraw Money</button>
                    </fieldset>
                </div>
            </div>
        </div>

    </section>

    <section id="send-money" class="w-11/12 mx-auto py-10 hidden toggles">
        <h2 class="font-bold text-2xl mb-5">Transfer Money</h2>

        <div class="send-money-form mt-10">
            <div class="card bg-base-100  shadow  rounded-2xl">
                <div class="card-body">
                    <fieldset class="fieldset space-y-2">
                        <label class="label text-neutral font-bold">User Account Number</label>
                        <input type="text" id="send-number" class="input rounded-full w-full " maxlength='11'
                            minlength='11' placeholder="Enter 11 digit number" />

                        <label class="label text-neutral font-bold">Amount</label>
                        <input type="number" id="send-amount" class="input rounded-full w-full"
                            placeholder="Enter amount to transfer" />

                        <label class="label text-neutral font-bold">Pin Number</label>
                        <input type="password" id="send-pin" class="input rounded-full w-full" maxlength='4'
                            minlength='4' placeholder="Enter your 4 digit pin" />
                        <!-- <div><a class="link link-hover ">Forgot Pin?</a></div> -->
                        <button class="btn btn-primary mt-4 rounded-xl" id="send-btn">Send Now</button>
                    </fieldset>
                </div>
            </div>
        </div>

    </section>

    <section id="get-bonus" class="w-11/12 mx-auto py-10 hidden toggles">
        <h2 class="font-bold text-2xl mb-5">Get Bonus</h2>

        <div class="get-bonus-form mt-10">
            <div class="card bg-base-100  shadow  rounded-2xl">
                <div class="card-body">
                    <fieldset class="fieldset space-y-2">
                        <label class="label text-neutral font-bold">Enter Bonus Coupon</label>
                        <input type="text" id="bonus-coupon" class="input rounded-full w-full"
                           placeholder="Enter your coupon" />
                        <!-- <div><a class="link link-hover ">Forgot Pin?</a></div> -->
                        <button class="btn btn-primary mt-4 rounded-xl" id="bonus-btn">Get Bonus</button>
                    </fieldset>
                </div>
            </div>
        </div>

    </section>

    <section id="pay-bill" class="w-11/12 mx-auto py-10 hidden toggles">
        <h2 class="font-bold text-2xl mb-5">Pay Bill</h2>

        <div class="pay-bill-form mt-10">
            <div class="card bg-base-100  shadow  rounded-2xl">
                <div class="card-body">
                    <fieldset class="fieldset space-y-2">
                        <label class="label text-neutral font-bold">Select A Bill</label>
                        <select class="select rounded-full w-full" id="bill-name">
                            <option disabled selected>Select A Bill</option>
                            <option value="electricity">Electricity</option>
                            <option value="gas">Gas</option>
                            <option value="water">Water</option>
                            <option value="internet">Internet</option>
                            <option value="phone">Phone</option>
                        </select>

                        <label class="label text-neutral font-bold">Biller Account Number</label>
                        <input type="text" id="bill-number" class="input rounded-full w-full" maxlength='11'
                            minlength='11' placeholder="Enter 11 digit Bill number" />

                        <label class="label text-neutral font-bold">Amount to Pay</label>
                        <input type="number" id="bill-amount" class="input rounded-full w-full"
                            placeholder="Enter amount to pay" />

                        <label class="label text-neutral font-bold">Pin Number</label>
                        <input type="password" id="bill-pin" class="input rounded-full w-full" maxlength='4'
                            minlength='4' placeholder="Enter your 4 digit pin" />
                        <!-- <div><a class="link link-hover ">Forgot Pin?</a></div> -->
                        <button class="btn btn-primary mt-4 rounded-xl" id="bill-btn">Pay Now</button>
                    </fieldset>
                </div>
            </div>
        </div>

    </section>

    <section id="history-container" class="w-11/12 mx-auto py-10 hidden toggles">

    </section>




    <script src="machine.js"></script>
    <script src="cashout.js"></script>
    <script src="addMoney.js"></script>
    <script src="sendMoney.js"></script>
    <script src="getBonus.js"></script>
    <script src="payBill.js"></script>
</body>

</html>
