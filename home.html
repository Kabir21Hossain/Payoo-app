<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Payoo</title>

    <!-- daisy ui + tailwindcss -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome cdn-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- font outfit -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <!-- favicon -->
    <link rel="shortcut icon" href="/assets/logo.png" type="image/x-icon">


    <style>
        * {
            font-family: "Outfit", sans-serif;
        }
    </style>

</head>

<body class="min-h-screen max-w-[480px] bg-base-200 mx-auto">

    <header class="shadow border-b border-b-gray-300">
        <section class="w-11/12 mx-auto py-3 flex justify-between items-center">
            <!-- left -->
            <div class="left flex gap-2 items-center">
                <div class="logo w-[60px]">
                    <img src="assets/logo.png" alt="logo">
                </div>

                <div class="balance-info">
                    <p class="text-2xl font-bold">$<span id="amount">45000.00</span></p>
                    <p class="text-neutral/50">Available Balance</p>
                    
                </div>
            </div>

            <!-- right -->

            <div class="right">
                <button class="btn btn-soft rounded-xl"> <a href="login.html"><span><i class="fa-solid fa-arrow-right-from-bracket"></i></span> Logout</a></button>
            </div>

        </section>
    </header>

    <section class="w-11/12 mx-auto pt-10">
        <div class="upper space-y-4">
            <h2 class="text-3xl font-bold">Welcome to Pay<span class="text-primary">oo</span></h2>
            <p class="text-neutral/50">Enjoy easy and convenient financial services with us. Cashout charge is low and </p>
        </div>

        <div class="buttons grid grid-cols-3 gap-x-3 gap-y-5 mt-8">
            <button class="btn btn-primary rounded-xl btn-soft flex-col h-full p-5">
                <img src="assets/opt-1.png" alt="Add-Money">
                <p>Add Money</p>
            </button>

            <button class="btn btn-primary rounded-xl btn-soft flex-col h-full p-5">
                <img src="assets/opt-2.png" alt="Cashout">
                <p>Cashout</p>
            </button>

            <button class="btn btn-primary rounded-xl btn-soft flex-col h-full p-5">
                <img src="assets/opt-3.png" alt="Transfer Money">
                <p>Transfer Money</p>
            </button>

            <button class="btn btn-primary rounded-xl btn-soft flex-col h-full p-5">
                <img src="assets/opt-4.png" alt="Get Bonus">
                <p>Get Bonus</p>
            </button>

            <button class="btn btn-primary rounded-xl btn-soft flex-col h-full p-5">
                <img src="assets/opt-5.png" alt="Pay Bill">
                <p>Pay Bill</p>
            </button>

            <button class="btn btn-primary rounded-xl btn-soft flex-col h-full p-5">
                <img src="assets/opt-6.png" alt="Transactions">
                <p>Transactions</p>
            </button>
            
        </div>
    </section>

    <section  id="cashout" class="w-11/12 mx-auto py-10">
        <h2 class="font-bold text-2xl mb-5">Cashout</h2>

        <div class="login mt-10">
        <div class="card bg-base-100  shadow  rounded-2xl">
            <div class="card-body">
                <fieldset class="fieldset space-y-2">
                    <label class="label text-neutral font-bold">Agent Number</label>
                    <input type="text" id="cashout-number" class="input rounded-full w-full " maxlength='11' minlength='11' placeholder="Enter 11 digit number" />
                
                    <label class="label text-neutral font-bold">Amount</label>
                    <input type="number" id="cashout-amount" class="input rounded-full w-full" maxlength='4' minlength='4' placeholder="Enter amount to withdraw" />

                    <label class="label text-neutral font-bold">Pin Number</label>
                    <input type="password" id="cashout-pin" class="input rounded-full w-full" maxlength='4' minlength='4' placeholder="Enter your 4 digit pin" />
                    <!-- <div><a class="link link-hover ">Forgot Pin?</a></div> -->
                    <button class="btn btn-primary mt-4 rounded-xl" id="cashout-btn">Withdraw Money</button>
                </fieldset>
            </div>
        </div>
    </div>

    </section>

   
</body>

</html>
